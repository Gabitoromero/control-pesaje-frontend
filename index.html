<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <script>
      // MIRRORS src/features/theme/resolveTheme.ts — keep in sync.
      // Runs before the module graph loads (cannot import ESM), so this
      // logic is hand-duplicated. Resolution order: localStorage -> OS
      // prefers-color-scheme -> dark (default). Negating the "light" query
      // means both "OS prefers dark" and "no/undetectable preference"
      // resolve to dark, matching resolveTheme.ts's default fallback.
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var isDark =
            stored === 'dark' ||
            (stored !== 'light' &&
              !(
                window.matchMedia &&
                window.matchMedia('(prefers-color-scheme: light)').matches
              ));
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
