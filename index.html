<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controlador de Pesaje</title>
    <script>
      // MIRRORS src/features/theme/resolveTheme.ts — keep in sync.
      // Runs before the module graph loads (cannot import ESM), so this
      // logic is hand-duplicated. resolveTheme.ts always resolves to dark
      // UNLESS the user explicitly stored 'light' — OS prefers-color-scheme
      // is never allowed to produce light on its own. Mirror that exactly.
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          if (stored !== 'light') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
